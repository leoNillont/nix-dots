general {
  grace = 3
}

background {
  path = /home/leonillo/Pictures/wall1.png
  blur_passes = 2
  blur_size = 3
  noise = 0.02
  brightness = 0.90
  vibrancy = 0.169
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.15 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -1 # -1 default circle, -2 follow input-field rounding
    outer_color = rgb(cba6f7)
    inner_color = rgba(49, 50, 68, 1.0)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    fade_timeout = 1000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Introduce tu contraseña...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = 15 # -1 means complete rounding (circle/oval)
    check_color = rgb(f38ba8)
    fail_color = rgb(f38ba8) # if authentication failed, changes outer_color and fail message color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 300 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = false # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -20
    halign = center
    valign = center
}

label {
    monitor = DP-1
    text = Bienvenido, leoNillo
    color = rgb(cdd6f4)
    font_size = 26
    font_family = A-OTF Shin Go Pro R

    position = 25, 25
}

label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%R")"
    color = rgb(cdd6f4)
    font_size = 90
    font_family = A-OTF Shin Go Pro
    position = -30, -20
    halign = right
    valign = top
}

label {
    monitor = 
    text = cmd[update:43200000] echo "$(date +"%A, %d %B %Y")"
    color = rgb(cdd6f4)
    font_size = 25
    font_family = A-OTF Shin Go Pro
    position = -30, -150
    halign = right
    valign = top
}
